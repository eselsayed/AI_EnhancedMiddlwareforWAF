<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>403 - Access Blocked</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    text-align: center;
  }

  /* Top row styling */
  .top {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  h1 {
    font-size: 24px;
    font-weight: 700;
    line-height: 1;
    white-space: nowrap;
  }

  .divider {
    width: 1px;
    height: 34px;
    background: #444;
  }

  .main-msg {
    font-size: 14px;
    color: #fff;
    white-space: nowrap;
  }

  /* Brief info block */
  .brief {
    display: flex;
    flex-direction: column;
    gap: 8px;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 16px 28px;
    min-width: 320px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 32px;
    font-size: 13px;
  }

  .label {
    color: #555;
    white-space: nowrap;
  }

  .value {
    color: #fff;
    font-weight: 500;
    text-align: right;
  }

  .value.danger { color: #ff4444; }
  .value.warn   { color: #f0a030; }
  .value.ok     { color: #4caf50; }

  /* Buttons styling */
  .btns {
    display: flex;
    gap: 10px;
  }

  a.btn {
    display: inline-block;
    padding: 9px 20px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: opacity .15s;
  }
  a.btn:hover { opacity: 0.8; }

  .btn-dashboard {
    background: #fff;
    color: #000;
  }

  .btn-back {
    background: transparent;
    color: #888;
    border: 1px solid #333;
  }
  .btn-back:hover { color: #fff; border-color: #555; opacity: 1; }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <h1>403</h1>
    <div class="divider"></div>
    <span class="main-msg">This request was blocked by the WAF.</span>
  </div>

  <div class="brief">
    <div class="row">
      <span class="label">Attack Type</span>
      <span class="value danger" id="attackType">{{ type }}</span>
    </div>
    <div class="row">
      <span class="label">AI Confidence</span>
      <span class="value warn" id="confidence">{{ confidence }}%</span>
    </div>
    <div class="row">
      <span class="label">Payload</span>
      <span class="value" id="payload" style="font-family:monospace;font-size:12px;color:#888">{{ payload }}</span>
    </div>
    <div class="row">
      <span class="label">Time (UTC)</span>
      <span class="value ok" id="ts"></span>
    </div>
  </div>

  <div class="btns">
    <a href="/" class="btn btn-dashboard">WAF Dashboard</a>
    <a href="javascript:history.back()" class="btn btn-back">← Go Back</a>
  </div>

</div>

<script>
  // Automatic timestamp generation
  document.getElementById('ts').textContent =
    new Date().toISOString().replace('T', ' ').slice(0, 19);
</script>
</body>
</html>
