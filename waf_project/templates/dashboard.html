<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="3">
    <title>SentinelAI - Monitoring</title>
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { background: #5c4ee5; color: white; width: 100%; padding: 20px 0; text-align: center; }
        .container { width: 90%; max-width: 1000px; margin-top: 30px; }
        .log-table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #555; }
        .status-blocked { color: #dc2626; font-weight: bold; }
        .status-allowed { color: #16a34a; font-weight: bold; }
        .payload { font-family: monospace; font-size: 13px; color: #444; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Traffic Monitoring Dashboard</h1>
    </div>
    <div class="container">
        <table class="log-table">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Payload</th>
                    <th>Detection</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td>{{ log.timestamp }}</td>
                    <td class="payload">{{ log.input }}</td>
                    <td>{{ log.detection }}</td>
                    <td>
                        <span class="{{ 'status-blocked' if log.status == 'Blocked' else 'status-allowed' }}">
                            {{ log.status }}
                        </span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
